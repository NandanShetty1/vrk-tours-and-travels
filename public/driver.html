<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Driver Portal - VRK Tours and Travels</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark"><img class="brand-logo" src="/assets/vrk-logo.jpeg" alt="VRK Tours and Travels logo"></span>
        <span>
          <strong>Driver Portal</strong>
          <small>Assigned trips and live status updates</small>
        </span>
      </a>
    </header>

    <main class="driver-shell">
      <section id="driverLoginPanel" class="login-panel">
        <div class="panel-heading">
          <span class="eyebrow">Trip duty</span>
          <h1>Driver login</h1>
          <p>Drivers can view only trips assigned to their account.</p>
        </div>
        <div class="auth-method-tabs driver-auth-tabs" role="tablist" aria-label="Driver login method">
          <button class="active" data-driver-auth-method="email" type="button">Email password</button>
          <button data-driver-auth-method="phone" type="button">Phone OTP</button>
        </div>
        <form id="driverEmailLoginForm" class="form-grid driver-auth-form" data-driver-auth-panel="email">
          <label class="full">
            Driver email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label class="full">
            Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary full" type="submit">Login</button>
        </form>
        <form id="driverPhoneLoginForm" class="form-grid driver-auth-form hidden" data-driver-auth-panel="phone">
          <label class="full">
            India mobile number
            <input name="phone" inputmode="numeric" maxlength="10" placeholder="9876543210" required>
          </label>
          <div id="driverRecaptcha" class="full"></div>
          <button class="secondary full" id="driverSendOtpButton" type="submit">Send OTP</button>
        </form>
        <form id="driverOtpForm" class="form-grid hidden">
          <label class="full">
            OTP
            <input name="otp" inputmode="numeric" autocomplete="one-time-code" required>
          </label>
          <button class="primary full" type="submit">Verify OTP</button>
        </form>
        <form id="driverLegacyLoginForm" class="form-grid hidden">
          <label class="full">
            Phone number
            <input name="phone" inputmode="tel">
          </label>
          <label class="full">
            Access code
            <input name="accessCode" type="password" inputmode="numeric">
          </label>
          <button class="primary full" type="submit">Open trips</button>
        </form>
        <p class="form-message full" id="driverLoginMessage" role="status"></p>
      </section>

      <section id="driverApp" class="hidden">
        <div class="dashboard-head">
          <div>
            <span class="eyebrow">Assigned work</span>
            <h1 id="driverName">Driver trips</h1>
          </div>
          <button id="driverLogoutButton" class="ghost" type="button">Logout</button>
        </div>
        <div id="driverMetrics" class="metric-grid"></div>
        <div id="driverTrips" class="trip-list"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/driver.js"></script>
  </body>
</html>
