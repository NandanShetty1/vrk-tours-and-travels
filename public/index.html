<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VRK Tours and Travels - Book a Car or Tour</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">VRK</span>
        <span>
          <strong>VRK Tours and Travels</strong>
          <small>Cars, tours, and one day packages</small>
        </span>
      </a>
    </header>

    <main class="customer-shell">
      <section class="booking-panel" aria-labelledby="booking-title">
        <div class="panel-heading">
          <span class="eyebrow">Live booking desk</span>
          <h1 id="booking-title">Book your cab or travel package</h1>
          <p>Choose a car, tour, or one day package. Owner confirms the final amount before payment.</p>
        </div>

        <form id="bookingForm" class="form-grid">
          <label>
            Customer name
            <input name="customerName" autocomplete="name" required>
          </label>
          <label>
            Mobile number
            <input name="phone" autocomplete="tel" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email">
          </label>
          <label>
            Passengers
            <input name="passengers" type="number" min="1" value="1" required>
          </label>
          <label>
            Travel date
            <input name="travelDate" type="date" required>
          </label>
          <label>
            Return date
            <input name="returnDate" type="date">
          </label>
          <label class="full">
            Pickup location
            <input name="pickupLocation" required>
          </label>
          <label class="full">
            Drop location
            <input name="dropLocation">
          </label>
          <label class="full">
            Notes
            <textarea name="message" rows="3" placeholder="Timing, luggage, temple darshan, special request"></textarea>
          </label>

          <input type="hidden" name="bookingType" id="bookingType" value="car">
          <input type="hidden" name="packageId" id="packageId">
          <input type="hidden" name="packageTitle" id="packageTitle">
          <input type="hidden" name="amount" id="amount">

          <div class="selected-strip full" id="selectedStrip">Select a car or package from the list.</div>
          <button class="primary full" type="submit">Send booking request</button>
          <p class="form-message full" id="bookingMessage" role="status"></p>
        </form>

        <div class="tracker-box">
          <h2>Track booking</h2>
          <form id="trackForm" class="track-form">
            <input name="bookingId" placeholder="Booking ID, example BK_sample" required>
            <button class="secondary" type="submit">Check</button>
          </form>
          <div id="trackResult" class="track-result" aria-live="polite"></div>
        </div>
      </section>

      <section class="catalog-area" aria-label="Available services">
        <div class="toolbar">
          <div>
            <span class="eyebrow">Available now</span>
            <h2>Services and packages</h2>
          </div>
          <div class="segmented" role="tablist" aria-label="Catalog type">
            <button class="active" data-tab="cars" type="button">Cars</button>
            <button data-tab="tours" type="button">Tours</button>
            <button data-tab="days" type="button">One day</button>
          </div>
        </div>
        <div id="catalog" class="catalog-grid"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/customer.js"></script>
  </body>
</html>
